<!-- Card -->
<div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
  <h2 class="text-lg font-bold text-navy mb-6">Welcome back</h2>

  <form id="loginForm" class="space-y-5" novalidate>

    <!-- Email -->
    <div>
      <label for="email" class="block text-sm font-semibold text-navy mb-1.5">Email Address</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
          <svg class="w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <input
          id="email"
          name="email"
          type="email"
          required
          placeholder="you@business.com"
          class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-10 pr-4 text-sm text-navy placeholder:text-gray-400 focus:outline-none focus:border-green focus:ring-2 focus:ring-green/20 transition-all"
        >
      </div>
      <p id="emailError" class="text-xs text-red-500 mt-1 hidden">Please enter a valid email.</p>
    </div>

    <!-- Password -->
    <div>
      <div class="flex justify-between items-center mb-1.5">
        <label for="password" class="block text-sm font-semibold text-navy">Password</label>
        <a href="#" class="text-xs font-semibold text-green hover:underline">Forgot password?</a>
      </div>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
          <svg class="w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </span>
        <input
          id="password"
          name="password"
          type="password"
          required
          placeholder="Enter your password"
          class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-10 pr-11 text-sm text-navy placeholder:text-gray-400 focus:outline-none focus:border-green focus:ring-2 focus:ring-green/20 transition-all"
        >
        <button id="togglePassword" type="button" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-navy transition-colors">
          <svg id="eyeIcon" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p id="passwordError" class="text-xs text-red-500 mt-1 hidden">Password is required.</p>
    </div>

    <!-- Submit -->
    <button
      id="submitBtn"
      type="submit"
      class="w-full bg-green text-navy font-bold py-3 rounded-xl text-sm hover:bg-emerald-400 active:scale-95 transition-all flex items-center justify-center gap-2 mt-2"
    >
      Login
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

  </form>
</div>
